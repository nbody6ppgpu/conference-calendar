name: Deadline Reminders

on:
  workflow_dispatch:
  schedule:
    - cron: "5 6 * * *"

permissions:
  contents: read
  issues: write

jobs:
  reminders:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: python -m pip install -r requirements.txt
      - name: Build reminder payload
        run: python scripts/build_reminders.py --json-output reminder_payload.json
      - name: Upsert reminder issue
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const payload = JSON.parse(fs.readFileSync("reminder_payload.json", "utf8"));
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            async function ensureLabel(name) {
              try {
                await github.rest.issues.getLabel({ owner, repo, name });
              } catch (error) {
                if (error.status !== 404) {
                  throw error;
                }
                await github.rest.issues.createLabel({
                  owner,
                  repo,
                  name,
                  color: "BFDADC",
                  description: "Automated deadline reminder issue",
                });
              }
            }

            await ensureLabel(payload.label);

            const issues = await github.paginate(github.rest.issues.listForRepo, {
              owner,
              repo,
              state: "all",
              labels: payload.label,
              per_page: 100,
            });

            const existing = issues.find((issue) => !issue.pull_request && issue.title === payload.title);

            if (existing) {
              await github.rest.issues.update({
                owner,
                repo,
                issue_number: existing.number,
                title: payload.title,
                body: payload.body,
                labels: [payload.label],
                state: "open",
              });
            } else {
              await github.rest.issues.create({
                owner,
                repo,
                title: payload.title,
                body: payload.body,
                labels: [payload.label],
              });
            }
