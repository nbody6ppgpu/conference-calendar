name: Auto-assign Copilot for tagged issues

on:
  issues:
    types:
      - opened

permissions:
  issues: write

jobs:
  assign:
    runs-on: ubuntu-latest
    steps:
      - name: Assign matching issues to Copilot
        uses: actions/github-script@v7
        with:
          script: |
            const title = context.payload.issue.title || "";
            const shouldAssign = /\[(new|ai)\]/i.test(title);
            if (!shouldAssign) {
              core.info("Issue title does not match [new]/[ai] tag pattern; skipping.");
              return;
            }

            await github.request("POST /repos/{owner}/{repo}/issues/{issue_number}/assignees", {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              assignees: ["copilot-swe-agent[bot]"],
              agent_assignment: {
                target_repo: `${context.repo.owner}/${context.repo.repo}`,
                base_branch: context.payload.repository.default_branch,
              },
              headers: {
                "X-GitHub-Api-Version": "2022-11-28",
              },
            });

            core.info("Issue assigned to copilot-swe-agent[bot].");
