name: Monthly Copilot Cleanup

on:
  workflow_dispatch:
  schedule:
    - cron: "17 3 4 * *"

permissions:
  contents: write
  pull-requests: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4

      - name: Install Copilot CLI
        run: npm install -g @github/copilot

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Python dependencies
        run: python -m pip install -r requirements.txt

      - name: Run Copilot cleanup task
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
        run: |
          copilot -p "Read AGENTS.md and clean the calendar. " \
            --no-ask-user \
            --allow-all-tools || gh auth status

      - name: Ensure only data/conferences.yml was modified
        run: |
          set -euo pipefail
      
          # Get changed files robustly (one per line)
          mapfile -t files < <(git diff --name-only --diff-filter=ACMRT)
      
          echo "Changed files:"
          printf ' - %s\n' "${files[@]:-}"
      
          allowed='data/conferences.yml'
          disallowed=()
      
          for f in "${files[@]:-}"; do
            [[ -z "$f" ]] && continue
            if [[ "$f" != "$allowed" ]]; then
              disallowed+=("$f")
            fi
          done
      
          if (( ${#disallowed[@]} > 0 )); then
            echo "Unexpected files changed. Only $allowed is allowed:"
            printf ' - %s\n' "${disallowed[@]}"
            exit 1
          fi

      - name: Rebuild generated outputs
        run: python scripts/build_calendar.py

      - name: Create pull request
        id: create-pr
        uses: peter-evans/create-pull-request@v8
        with:
          branch: copilot/monthly-calendar-cleanup
          commit-message: |
            Clean outdated conference entries
          title: Clean outdated conference entries
          body: |
            ## Summary
            - run the scheduled Copilot cleanup task from AGENTS.md
            - rebuild generated calendar outputs after YAML updates

            ## Test plan
            - [x] python scripts/build_calendar.py
          delete-branch: true

      - name: Report result
        run: |
          if [ -n "${{ steps.create-pr.outputs.pull-request-number }}" ]; then
            echo "Created PR #${{ steps.create-pr.outputs.pull-request-number }}"
          else
            echo "No calendar changes detected; skipping PR creation."
          fi
