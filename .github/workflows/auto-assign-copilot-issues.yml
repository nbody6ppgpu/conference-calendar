name: Auto-assign Copilot for tagged issues

on:
  issues:
    types:
      - opened

permissions:
  issues: write

jobs:
  assign:
    runs-on: ubuntu-latest
    steps:
      - name: Assign matching issues to Copilot
        # ISSUE_ASSIGN_TOKEN must be a fine-grained PAT (or classic PAT) stored as a
        # repository/org secret with Issues: Read & Write permission on this repo.
        # GITHUB_TOKEN is not used here because it is rejected (403 Forbidden) when
        # trying to assign copilot-swe-agent[bot] under stricter org/repo policies.
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.ISSUE_ASSIGN_TOKEN }}
          script: |
            const title = context.payload.issue.title || "";
            const shouldAssign = /\[(new|ai)\]/i.test(title);
            if (!shouldAssign) {
              core.info("Issue title does not match [new]/[ai] tag pattern; skipping.");
              return;
            }

            await github.request("POST /repos/{owner}/{repo}/issues/{issue_number}/assignees", {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              assignees: ["copilot-swe-agent[bot]"],
              headers: {
                "X-GitHub-Api-Version": "2022-11-28",
              },
            });

            core.info("Issue assigned to copilot-swe-agent[bot].");
